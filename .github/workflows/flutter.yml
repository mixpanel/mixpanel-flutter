name: Mixpanel Flutter SDK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-main-code:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - run: flutter pub get
      - run: flutter test
      - run: flutter analyze --no-pub --no-current-package --no-fatal-infos lib

  test-android-integration:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: "17"
          distribution: 'temurin'
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Test Android integration
        working-directory: example
        run: flutter build apk

  test-ios-integration:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: "17"
          distribution: 'temurin'
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Clean
        working-directory: example
        run: flutter clean
      - name: Flutter pub get
        working-directory: example
        run: flutter pub get
      - name: CocoaPods update
        working-directory: example/ios
        run: pod repo update
      - name: Test iOS integration
        working-directory: example
        run: flutter build ios --debug --simulator --no-codesign

  test-macos-integration:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Clean
        working-directory: example
        run: flutter clean
      - name: Flutter pub get
        working-directory: example
        run: flutter pub get
      - name: CocoaPods update
        working-directory: example/macos
        run: pod repo update
      - name: Test macOS integration
        working-directory: example
        run: flutter build macos --debug
