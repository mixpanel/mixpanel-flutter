name: Mixpanel Flutter SDK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-main-code:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - run: flutter pub get
      - run: flutter test
      - run: flutter analyze --no-pub --no-current-package --no-fatal-infos lib

  test-android-integration:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: "17"
          distribution: 'temurin'
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Test Android integration
        working-directory: example
        run: flutter build apk

  test-ios-integration:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: "17"
          distribution: 'temurin'
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Clean
        working-directory: example
        run: flutter clean
      - name: Flutter pub get
        working-directory: example
        run: flutter pub get
      - name: CocoaPods update
        working-directory: example/ios
        run: pod repo update
      - name: Test iOS integration
        working-directory: example
        run: flutter build ios --debug --simulator --no-codesign

  test-macos-integration:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: "3.41.0"
      - name: Clean
        working-directory: example
        run: flutter clean
      - name: Flutter pub get
        working-directory: example
        run: flutter pub get
      - name: CocoaPods update
        working-directory: example/macos
        run: pod repo update
      - name: Test macOS integration
        working-directory: example
        run: flutter build macos --debug
