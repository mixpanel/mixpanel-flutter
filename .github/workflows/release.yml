name: Create release

on:
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    name: "🚀 Release"
    runs-on: ubuntu-latest
    steps:
      - name: "Check-out"
        uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e  # v1
      - name: "Update Release CHANGELOG"
        id: update-release-changelog
        uses: heinrichreimer/github-changelog-generator-action@854576bb5274851427527d8199fba0061552dff5  # v2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          onlyLastTag: true
          stripHeaders: false
          base: "CHANGELOG.md"
          headerLabel: "# Changelog"
          breakingLabel: '### Breaking'
          enhancementLabel: '### Enhancements'
          stripGeneratorNotice: true
          bugsLabel: '### Fixes'
          issues: false
          issuesWoLabels: false
          pullRequests: true
          prWoLabels: true
          author: false
          verbose: true
      - name: Commit CHANGELOG Changes
        run: |
          git add .
          git config user.name "zihe.jia"
          git config user.email "zihe.jia@mixpanel.com"
          git commit -m "Update CHANGELOG"
      - name: Push CHANGELOG changes
        uses: ad-m/github-push-action@77c5b412c50b723d2a4fbc6d71fb5723bcd439aa  # v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: true
      - name: "Prepare for the Github Release"
        id: generate-release-changelog
        uses: heinrichreimer/github-changelog-generator-action@854576bb5274851427527d8199fba0061552dff5  # v2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output: "output.md"
          headerLabel: "# Changelog"
          onlyLastTag: true
          stripHeaders: false
          breakingLabel: '### Breaking'
          enhancementLabel: '### Enhancements'
          stripGeneratorNotice: true
          bugsLabel: '### Fixes'
          issues: false
          issuesWoLabels: false
          pullRequests: true
          prWoLabels: true
          author: false
          verbose: true
      - name: "🚀 Create GitHub Release"
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e  # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.generate-release-changelog.outputs.changelog }}
