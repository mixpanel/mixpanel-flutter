name: mixpanel_flutter_common
description: Shared pure-Dart support for the Mixpanel Flutter SDK family — EventBridge interface and JSONLogic evaluator. Consumed by mixpanel_flutter and downstream packages (e.g. mixpanel_flutter_session_replay).
version: 0.1.0
homepage: https://mixpanel.com
repository: https://github.com/mixpanel/mixpanel-flutter
issue_tracker: https://github.com/mixpanel/mixpanel-flutter/issues

environment:
  # Matches mixpanel_flutter's published SDK floor. JSONLogic is intentionally
  # written without Dart 3 features (sealed classes, switch expressions,
  # constructor tearoffs) so depending on this package doesn't force
  # mixpanel_flutter consumers to bump their Dart version.
  sdk: '>=2.12.0 <4.0.0'

dependencies:
  meta: ^1.8.0

dev_dependencies:
  test: ^1.24.0
  lints: ^4.0.0
