buildscript {
    // Must be >= 2.0 so the plugin can compile against
    // mixpanel-android-common:1.0.1 (Kotlin 2.0 metadata). The example
    // app's KGP wins on the shared build classpath, so it must be at
    // least as new as the plugin requires.
    ext.kotlin_version = '2.0.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
