name: mixpanel_flutter_session_replay
description: Official Flutter Session Replay SDK for Mixpanel, developed and maintained by Mixpanel, Inc.

version: 1.0.0
homepage: https://mixpanel.com
repository: https://github.com/mixpanel/mixpanel-flutter/tree/main/packages/mixpanel_flutter_session_replay
issue_tracker: https://github.com/mixpanel/mixpanel-flutter/issues
documentation: https://developer.mixpanel.com/docs/flutter
topics:
  - analytics
  - session-replay
  - mixpanel

environment:
  sdk: ^3.8.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.12.0
  image: ^4.3.0
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.0
  http: ^1.2.0
  uuid: ^4.5.1
  logging: ^1.2.0
  sqflite: ^2.3.0
  clock: ^1.1.1
  shared_preferences: ^2.3.0
  mixpanel_flutter_common: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0
  fake_async: ^1.3.1
  shared_preferences_platform_interface: ^2.4.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  plugin:
    platforms:
      android:
        package: com.mixpanel.flutter_session_replay
        pluginClass: MixpanelSessionReplayPlugin
      ios:
        pluginClass: MixpanelSessionReplayPlugin
      macos:
        pluginClass: MixpanelSessionReplayPlugin
